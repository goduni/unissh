name: Bug report
description: Report a reproducible problem in UniSSH (not a security issue).
title: "bug: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        > [!CAUTION]
        > **Do not report security vulnerabilities here.** Public issues disclose the
        > problem before a fix exists. Report privately — email **uni@goduni.me** or use
        > GitHub's private ["Report a vulnerability"](https://github.com/goduni/unissh/security/advisories/new)
        > form. See [`SECURITY.md`](https://github.com/goduni/unissh/blob/main/SECURITY.md).

        Before filing, please skim the
        [README FAQ / Troubleshooting](https://github.com/goduni/unissh#faq--troubleshooting)
        and the [docs site](https://goduni.github.io/unissh/) — several common issues
        (unsigned-build warnings, a client not reaching the server, `wasm not loaded`,
        `TransportRollback` after a restore) are answered there.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: This is **not** a security vulnerability (those go privately to uni@goduni.me).
          required: true
        - label: I searched [existing issues](https://github.com/goduni/unissh/issues) and the README FAQ, and this isn't a known/answered problem.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the monorepo does this bug live in? Pick the closest one.
      options:
        - rust-core (crypto / keychain / storage / vault / ssh-agent / ssh-transport / ffi / cli / sync)
        - server (self-hosted axum server)
        - server-ui (web admin panel)
        - client (Tauri desktop / mobile)
        - website / docs
        - deploy / self-host (Caddy / Docker Compose)
        - other / not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS / platform
      description: Where did this happen?
      options:
        - Linux
        - macOS
        - Windows
        - iOS
        - Android
        - Docker / container host (server / deploy)
        - Other / not applicable
    validations:
      required: true

  - type: input
    id: os-details
    attributes:
      label: OS / platform details
      description: Version + arch, e.g. "Ubuntu 24.04 x86_64", "macOS 15.4 arm64", "Windows 11 23H2".
      placeholder: e.g. Ubuntu 24.04 x86_64
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install / run it?
      description: Prebuilt installers may not exist yet — most users build from source or run Docker today.
      options:
        - Built from source (cargo / npm / just / tauri build)
        - Docker (server / deploy compose)
        - Prebuilt binary / installer (note — these may not exist yet)
        - Other / not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      description: A release tag if you used one, otherwise the `git` commit SHA you built from (`git rev-parse --short HEAD`). UniSSH is pre-1.0, so the commit is what matters most.
      placeholder: e.g. f3f1608 (commit) or v0.x.y (tag)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior. Include exact error messages.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. A failing test or script is even better.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Click `...`
        4. See error `...`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: |
        Paste relevant logs, stack traces, or console output. This is rendered as a
        code block, so no backticks needed.

        > [!WARNING]
        > Scrub secrets first — setup codes, ops tokens, instance URLs you don't want
        > public, passwords, and anything resembling private key material. **Never**
        > paste private keys or vault ciphertext.
      render: text
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, related config (with secrets removed), or context that might help.
    validations:
      required: false
