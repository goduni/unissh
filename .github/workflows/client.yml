name: Client (Tauri)

# Two flows in one file:
#   (a) CI  — on pull_request + push to main: build the desktop bundles to
#             validate they compile/bundle. No GitHub Release is created.
#   (b) Release — on push of a 'v*' tag: build release bundles and attach them
#             to a GitHub Release.
#
# UNSIGNED BY DESIGN (privacy): no signing/notarization secrets are provided to
# tauri-action — no APPLE_* (cert/identity/id/team/password), no Windows code-
# signing cert, no notarization. macOS .app/.dmg and Windows .msi/.exe ship
# unsigned (Gatekeeper quarantine / SmartScreen expected); Linux artifacts are
# unsigned. authors=["UniSSH"] and the identity-free bundle identifier
# (me.goduni.unissh) carry no personal identity. Instead of a code-signing cert,
# each release ships a SHA256SUMS checksum file and GitHub build provenance
# (SLSA attestations) — verifiable with `gh attestation verify` (see the
# release-integrity job below). Provenance proves the public CI built exactly
# these artifacts from this public commit, which a paid cert cannot.
#
# MONOREPO: the client's path dep (client/src-tauri -> ../../rust-core/crates/ffi)
# resolves inside this single checkout — only actions/checkout of this repo is
# used. No cross-repo checkout, no CORE_REPO_TOKEN / PAT of any kind.
#
# Mobile is built for SIDELOADING only — no store listing, and no identity:
#   * Android: an installable APK must carry *a* signature, but nothing says it
#     must carry an identity. The release APK is signed by a self-signed key
#     whose certificate subject is just "CN=UniSSH Release" (no name/email/org)
#     — generated offline, stored only as a repo secret. Play Protect will warn;
#     that is the expected cost of an anonymous distributable.
#   * iOS: ships as an UNSIGNED .ipa. Stock iOS refuses unsigned code, so the
#     user re-signs it with their own Apple ID (AltStore / Sideloadly) — the
#     only identity ever attached is the installer's own, never the project's.
# Both get the same SHA256SUMS + SLSA provenance treatment as desktop.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 pinned: webkit2gtk-4.1 availability + broad AppImage
          # glibc compatibility. Produces .deb / .rpm / .AppImage.
          - platform: ubuntu-22.04
          # .msi (WiX) + NSIS .exe
          - platform: windows-latest
          # .dmg / .app
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    # Tag builds create/append to a GitHub Release → need write on contents.
    # On CI runs (branch/PR) this permission is simply unused.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system deps (Tauri/webkit + AppImage/rpm tooling)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      # Toolchain channel (1.94) + components: the standalone client/src-tauri
      # workspace inherits the pin from the repo-root rust-toolchain.toml, which
      # rustup discovers by walking up parent dirs (no per-crate toolchain file).
      - name: Cache Rust (client/src-tauri standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install client npm deps
        # Force a fresh, platform-correct resolve of native optional deps.
        # @tauri-apps/cli (and Vite/oxc/rolldown) ship per-platform native
        # binaries via optionalDependencies. A package-lock generated on one OS
        # makes BOTH `npm ci` AND `npm install` skip the other OSes' binaries on
        # those runners (npm optional-deps bug npm/cli#4828) -> "Cannot find
        # module @tauri-apps/cli-<plat>". Removing the lock + node_modules first
        # forces npm to resolve THIS runner's optionals from scratch.
        # `rm -rf` needs a POSIX shell: on windows-latest the default `run:` shell
        # is PowerShell, where `rm -rf` errors out (`rm`->Remove-Item has no -rf).
        # Git Bash ships on all three runners, so pin bash for this one step.
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
        working-directory: client

      # Windows-only: SQLCipher vendors + statically links OpenSSL there (no system
      # OpenSSL on Windows, and the shipped .exe must be self-contained — see
      # rust-core/crates/storage/Cargo.toml). Building OpenSSL from source
      # (openssl-src) needs NASM to assemble its crypto; Perl ships on the runner.
      - name: Install NASM (Windows OpenSSL vendored build)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO signing/notarization env on purpose — see header. Unsigned builds.
        with:
          projectPath: client
          # Release flow (tag push): cut a GitHub Release and upload bundles.
          # CI flow (branch/PR/dispatch): tagName empty → tauri-action builds
          # the bundles only and does NOT create a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          releaseBody: |
            UniSSH desktop builds. These binaries are **unsigned** (privacy: no
            developer identity is attached).

            - **macOS** (.dmg/.app): Gatekeeper will quarantine the app. After
              moving it to /Applications run:
              `xattr -dr com.apple.quarantine /Applications/UniSSH.app`
            - **Windows** (.msi/.exe): SmartScreen may warn — choose
              "More info" → "Run anyway".
            - **Linux** (.deb/.rpm/.AppImage): no signing.
            - **Android** (.apk, arm64): a sideload build — enable "install
              unknown apps" for your browser/file manager. Signed by an
              identity-free self-signed key (subject `CN=UniSSH Release`), so
              Play Protect will warn.
            - **iOS** (.ipa): an UNSIGNED sideload build. Stock iOS refuses
              unsigned code — install it by re-signing with your own Apple ID
              via [AltStore](https://altstore.io) or Sideloadly. The only
              identity on the app after that is your own.

            **Verify what you downloaded** — you do not need to trust the maintainer:
            - **Checksums:** download `SHA256SUMS` and run `sha256sum -c SHA256SUMS`
              (Windows PowerShell: `Get-FileHash <file> -Algorithm SHA256`).
            - **Provenance:** `gh attestation verify <file> --repo goduni/unissh`
              cryptographically proves GitHub's CI built this exact file from this
              public commit (stronger than a code-signing cert for this purpose).
            - Or **build from source** and trust only your own compiler.

  # ---------------------------------------------------------------------------
  # Android: arm64 sideload APK, signed by an identity-free self-signed key
  # (see the header). gen/android is gitignored by design, so the project is
  # (re)generated here on every run — the signing block is injected right after
  # init, before gradle ever evaluates the project.
  # ---------------------------------------------------------------------------
  android:
    name: build (android, arm64 apk)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Java (AGP)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Add the Android Rust target
        run: rustup target add aarch64-linux-android

      - name: Cache Rust (client/src-tauri standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
          key: android

      - name: Point the build at the runner's preinstalled NDK
        run: |
          echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          # openssl-src (vendored libcrypto for SQLCipher — see
          # rust-core/crates/storage/Cargo.toml) discovers the android clang
          # wrappers via PATH, not via the *_HOME vars.
          echo "$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install client npm deps
        # Same fresh-resolve rationale as the desktop job (npm/cli#4828).
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
        working-directory: client

      - name: Generate the Android project + icons
        run: |
          npx tauri android init
          npx tauri icon src-tauri/app-icon.png
        working-directory: client

      - name: Wire release signing into the generated gradle project
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_B64" | base64 -d > gen/android/unissh-release.p12
          python3 - <<'PYEOF'
          import pathlib, sys

          p = pathlib.Path("gen/android/app/build.gradle.kts")
          s = p.read_text()
          if "signingConfigs" in s:
              sys.exit("signingConfigs already present — template changed, re-check this patch")

          sign = """
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH")!!)
                      storeType = "PKCS12"
                      keyAlias = "unissh"
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyPassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                  }
              }
          """
          out = s.replace("android {", "android {" + sign, 1)
          if out == s:
              sys.exit("anchor `android {` not found in build.gradle.kts")
          s = out
          out = s.replace(
              'getByName("release") {',
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
              1,
          )
          if out == s:
              sys.exit('anchor `getByName("release") {` not found in build.gradle.kts')
          p.write_text(out)
          print("release signing wired into app/build.gradle.kts")
          PYEOF
        working-directory: client/src-tauri

      - name: Build the signed release APK (arm64)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/client/src-tauri/gen/android/unissh-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: npx tauri android build --apk --target aarch64
        working-directory: client

      - name: Collect + verify the APK signature
        run: |
          APK=$(find client/src-tauri/gen/android -name '*-release.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "no signed release apk found; apks present:"
            find client/src-tauri/gen/android -name '*.apk'
            exit 1
          fi
          VERSION=$(node -p "require('./client/src-tauri/tauri.conf.json').version")
          OUT="UniSSH_${VERSION}_arm64.apk"
          cp "$APK" "$OUT"
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs "$OUT"
          echo "APK_NAME=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_NAME }}
          if-no-files-found: error

      - name: Attach to the release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # tauri-action (desktop job) creates the release with the full notes;
          # wait for it instead of racing it with a bare `release create` that
          # would win the race and ship an empty body.
          for i in $(seq 1 60); do
            gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 && break
            sleep 30
          done
          gh release upload "${{ github.ref_name }}" "$APK_NAME" \
            --repo "${{ github.repository }}" --clobber

  # ---------------------------------------------------------------------------
  # iOS: unsigned sideload .ipa (see the header — the installer re-signs with
  # their own Apple ID; the project never touches a signing identity). Built
  # with xcodebuild directly because `tauri ios build` insists on a signing
  # team; the Xcode build phase still drives the Rust/frontend build via the
  # tauri CLI (`tauri ios xcode-script`).
  # ---------------------------------------------------------------------------
  ios:
    name: build (ios, unsigned sideload ipa)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Add the iOS Rust target
        run: rustup target add aarch64-apple-ios

      - name: Cache Rust (client/src-tauri standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
          key: ios

      - name: Install client npm deps
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
        working-directory: client

      - name: Generate the iOS project + icons
        run: |
          npx tauri ios init
          npx tauri icon src-tauri/app-icon.png
        working-directory: client

      - name: Build the .app unsigned
        run: |
          cd src-tauri/gen/apple
          PROJ=$(ls -d *.xcodeproj | head -1)
          SCHEME=$(xcodebuild -project "$PROJ" -list \
            | sed -n '/Schemes:/,$p' | tail -n +2 | sed 's/^ *//' | grep -m1 .)
          echo "building project=$PROJ scheme=$SCHEME"
          xcodebuild \
            -project "$PROJ" -scheme "$SCHEME" -configuration release \
            -destination 'generic/platform=iOS' -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
        working-directory: client

      - name: Package the sideload IPA
        run: |
          APP=$(find client/src-tauri/gen/apple/build/Build/Products -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "no .app produced; products:"
            find client/src-tauri/gen/apple/build/Build/Products -maxdepth 3 | head -30
            exit 1
          fi
          VERSION=$(node -p "require('./client/src-tauri/tauri.conf.json').version")
          OUT="UniSSH_${VERSION}_ios-sideload.ipa"
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry "$OUT" Payload
          echo "IPA_NAME=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.IPA_NAME }}
          if-no-files-found: error

      - name: Attach to the release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 && break
            sleep 30
          done
          gh release upload "${{ github.ref_name }}" "$IPA_NAME" \
            --repo "${{ github.repository }}" --clobber

  # ---------------------------------------------------------------------------
  # Release integrity (tag builds only): publish a SHA256SUMS file and a build
  # provenance attestation for the artifacts tauri-action just uploaded.
  #
  # This is the compensating control for unsigned-by-design releases: no Apple/
  # Authenticode cert (which would require a legal identity), but every artifact
  # gets (a) a checksum users can verify and (b) a SLSA provenance attestation
  # bound — via GitHub OIDC, no personal key — to this repo + workflow + commit.
  # Verify a download with:  gh attestation verify <file> --repo goduni/unissh
  # ---------------------------------------------------------------------------
  release-integrity:
    name: checksums + provenance
    # Waits for mobile too so the APK/IPA land in SHA256SUMS. `!cancelled()`
    # (not the implicit success()) so a broken mobile leg degrades the release
    # to desktop-only instead of shipping desktop artifacts with no checksums.
    needs: [build, android, ios]
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload SHA256SUMS to the release
      id-token: write # OIDC for build provenance
      attestations: write # write the attestation
    steps:
      - name: Download the release artifacts tauri-action uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --dir dist
          # Drop any integrity files from a previous re-run so they are neither
          # attested nor re-hashed into themselves.
          rm -f dist/SHA256SUMS dist/SHA256SUMS.minisig

      - name: Attest build provenance for the artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Generate SHA256SUMS (bare filenames, for `sha256sum -c`)
        run: |
          ( cd dist && sha256sum * ) > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" --clobber

      # TODO(maintainer): optional pseudonymous minisign signature over SHA256SUMS.
      # minisign (a single Ed25519 public key, NO name/email, no keyservers/WoT) is
      # the anonymity-safe choice — unlike GPG (identity in the UID) or cosign
      # keyless (OIDC identity in the public Rekor log).
      #   1. Offline:  minisign -G -p minisign.pub -s minisign.key   (commit minisign.pub)
      #   2. Store the secret key as the `MINISIGN_SECRET_KEY` repo secret.
      #   3. Uncomment:
      # - name: Sign SHA256SUMS with minisign
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      #   run: |
      #     sudo apt-get update && sudo apt-get install -y minisign
      #     printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
      #     minisign -S -s minisign.key -m SHA256SUMS -x SHA256SUMS.minisig
      #     rm -f minisign.key
      #     gh release upload "${{ github.ref_name }}" SHA256SUMS.minisig \
      #       --repo "${{ github.repository }}" --clobber
