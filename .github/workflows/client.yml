name: Client (Tauri desktop)

# Two flows in one file:
#   (a) CI  — on pull_request + push to main: build the desktop bundles to
#             validate they compile/bundle. No GitHub Release is created.
#   (b) Release — on push of a 'v*' tag: build release bundles and attach them
#             to a GitHub Release.
#
# UNSIGNED BY DESIGN (privacy): no signing/notarization secrets are provided to
# tauri-action — no APPLE_* (cert/identity/id/team/password), no Windows code-
# signing cert, no notarization. macOS .app/.dmg and Windows .msi/.exe ship
# unsigned (Gatekeeper quarantine / SmartScreen expected); Linux artifacts are
# unsigned. authors=["UniSSH"] and the identity-free bundle identifier
# (me.goduni.unissh) carry no personal identity. Instead of a code-signing cert,
# each release ships a SHA256SUMS checksum file and GitHub build provenance
# (SLSA attestations) — verifiable with `gh attestation verify` (see the
# release-integrity job below). Provenance proves the public CI built exactly
# these artifacts from this public commit, which a paid cert cannot.
#
# MONOREPO: the client's path dep (client/src-tauri -> ../../rust-core/crates/ffi)
# resolves inside this single checkout — only actions/checkout of this repo is
# used. No cross-repo checkout, no CORE_REPO_TOKEN / PAT of any kind.
#
# Mobile (iOS/Android) is intentionally OUT of scope: there is no
# privacy-preserving unsigned distributable for those stores/runtimes.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 pinned: webkit2gtk-4.1 availability + broad AppImage
          # glibc compatibility. Produces .deb / .rpm / .AppImage.
          - platform: ubuntu-22.04
          # .msi (WiX) + NSIS .exe
          - platform: windows-latest
          # .dmg / .app
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    # Tag builds create/append to a GitHub Release → need write on contents.
    # On CI runs (branch/PR) this permission is simply unused.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system deps (Tauri/webkit + AppImage/rpm tooling)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      # Toolchain channel (1.94) + components: the standalone client/src-tauri
      # workspace inherits the pin from the repo-root rust-toolchain.toml, which
      # rustup discovers by walking up parent dirs (no per-crate toolchain file).
      - name: Cache Rust (client/src-tauri standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install client npm deps
        # Force a fresh, platform-correct resolve of native optional deps.
        # @tauri-apps/cli (and Vite/oxc/rolldown) ship per-platform native
        # binaries via optionalDependencies. A package-lock generated on one OS
        # makes BOTH `npm ci` AND `npm install` skip the other OSes' binaries on
        # those runners (npm optional-deps bug npm/cli#4828) -> "Cannot find
        # module @tauri-apps/cli-<plat>". Removing the lock + node_modules first
        # forces npm to resolve THIS runner's optionals from scratch.
        # `rm -rf` needs a POSIX shell: on windows-latest the default `run:` shell
        # is PowerShell, where `rm -rf` errors out (`rm`->Remove-Item has no -rf).
        # Git Bash ships on all three runners, so pin bash for this one step.
        shell: bash
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund
        working-directory: client

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO signing/notarization env on purpose — see header. Unsigned builds.
        with:
          projectPath: client
          # Release flow (tag push): cut a GitHub Release and upload bundles.
          # CI flow (branch/PR/dispatch): tagName empty → tauri-action builds
          # the bundles only and does NOT create a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseDraft: false
          prerelease: false
          releaseBody: |
            UniSSH desktop builds. These binaries are **unsigned** (privacy: no
            developer identity is attached).

            - **macOS** (.dmg/.app): Gatekeeper will quarantine the app. After
              moving it to /Applications run:
              `xattr -dr com.apple.quarantine /Applications/UniSSH.app`
            - **Windows** (.msi/.exe): SmartScreen may warn — choose
              "More info" → "Run anyway".
            - **Linux** (.deb/.rpm/.AppImage): no signing.

            **Verify what you downloaded** — you do not need to trust the maintainer:
            - **Checksums:** download `SHA256SUMS` and run `sha256sum -c SHA256SUMS`
              (Windows PowerShell: `Get-FileHash <file> -Algorithm SHA256`).
            - **Provenance:** `gh attestation verify <file> --repo goduni/unissh`
              cryptographically proves GitHub's CI built this exact file from this
              public commit (stronger than a code-signing cert for this purpose).
            - Or **build from source** and trust only your own compiler.

  # ---------------------------------------------------------------------------
  # Release integrity (tag builds only): publish a SHA256SUMS file and a build
  # provenance attestation for the artifacts tauri-action just uploaded.
  #
  # This is the compensating control for unsigned-by-design releases: no Apple/
  # Authenticode cert (which would require a legal identity), but every artifact
  # gets (a) a checksum users can verify and (b) a SLSA provenance attestation
  # bound — via GitHub OIDC, no personal key — to this repo + workflow + commit.
  # Verify a download with:  gh attestation verify <file> --repo goduni/unissh
  # ---------------------------------------------------------------------------
  release-integrity:
    name: checksums + provenance
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload SHA256SUMS to the release
      id-token: write # OIDC for build provenance
      attestations: write # write the attestation
    steps:
      - name: Download the release artifacts tauri-action uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --dir dist
          # Drop any integrity files from a previous re-run so they are neither
          # attested nor re-hashed into themselves.
          rm -f dist/SHA256SUMS dist/SHA256SUMS.minisig

      - name: Attest build provenance for the artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Generate SHA256SUMS (bare filenames, for `sha256sum -c`)
        run: |
          ( cd dist && sha256sum * ) > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS \
            --repo "${{ github.repository }}" --clobber

      # TODO(maintainer): optional pseudonymous minisign signature over SHA256SUMS.
      # minisign (a single Ed25519 public key, NO name/email, no keyservers/WoT) is
      # the anonymity-safe choice — unlike GPG (identity in the UID) or cosign
      # keyless (OIDC identity in the public Rekor log).
      #   1. Offline:  minisign -G -p minisign.pub -s minisign.key   (commit minisign.pub)
      #   2. Store the secret key as the `MINISIGN_SECRET_KEY` repo secret.
      #   3. Uncomment:
      # - name: Sign SHA256SUMS with minisign
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      #   run: |
      #     sudo apt-get update && sudo apt-get install -y minisign
      #     printf '%s' "$MINISIGN_SECRET_KEY" > minisign.key
      #     minisign -S -s minisign.key -m SHA256SUMS -x SHA256SUMS.minisig
      #     rm -f minisign.key
      #     gh release upload "${{ github.ref_name }}" SHA256SUMS.minisig \
      #       --repo "${{ github.repository }}" --clobber
